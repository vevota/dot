<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

function resize() {
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const cx = c.width / 2;
const cy = c.height / 2;
const maxR = Math.min(c.width, c.height) * 0.6;
const layers = 12;
const sides = [3, 4, 5, 6, 8, 12];
let t = 0;

function draw() {
  ctx.clearRect(0, 0, c.width, c.height);

  const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
  gradient.addColorStop(0, '#1a1423');
  gradient.addColorStop(0.5, '#0f0d1a');
  gradient.addColorStop(1, '#050508');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, c.width, c.height);

  ctx.save();
  ctx.translate(cx, cy);

  for (let l = 0; l < layers; l++) {
    const r = maxR * (0.08 + (l / layers) * 0.85);
    const n = sides[l % sides.length];
    const rot = t * (0.02 + l * 0.005);
    const alpha = 0.08 + (l / layers) * 0.15;

    ctx.save();
    ctx.rotate(rot);

    ctx.beginPath();
    ctx.strokeStyle = `rgba(201, 168, 76, ${alpha})`;
    ctx.lineWidth = 1 + (l / layers) * 1.5;
    for (let i = 0; i <= n * 4; i++) {
      const a = (i / (n * 4)) * Math.PI * 2;
      const rr = r + Math.sin(a * n + t * 0.01) * r * 0.15;
      const x = Math.cos(a) * rr;
      const y = Math.sin(a) * rr;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();
  }

  // cross
  const crossSize = maxR * 0.08;
  ctx.save();
  ctx.rotate(Math.sin(t * 0.003) * 0.1);
  ctx.shadowColor = '#c9a84c';
  ctx.shadowBlur = 30;
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, -crossSize);
  ctx.lineTo(0, crossSize);
  ctx.moveTo(-crossSize, 0);
  ctx.lineTo(crossSize, 0);
  ctx.stroke();
  ctx.restore();

  // outer circles
  ctx.save();
  ctx.rotate(-t * 0.005);
  for (let i = 0; i < 24; i++) {
    const a = (i / 24) * Math.PI * 2;
    const rr = maxR * 0.7;
    const x = Math.cos(a) * rr;
    const y = Math.sin(a) * rr;
    ctx.beginPath();
    ctx.arc(x, y, 2 + Math.sin(t * 0.02 + i) * 1, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(201, 168, 76, ${0.2 + Math.sin(t * 0.02 + i) * 0.1})`;
    ctx.fill();
  }
  ctx.restore();

  ctx.restore();

  t++;
  requestAnimationFrame(draw);
}

draw();
</script>

<script>
(function() {
  var c = document.createElement('canvas');
  c.style.position = 'fixed';
  c.style.top = '0';
  c.style.left = '0';
  c.style.width = '100%';
  c.style.height = '100%';
  c.style.zIndex = '0';
  c.style.pointerEvents = 'none';
  document.body.appendChild(c);
  var ctx = c.getContext('2d');

  var colors = [
    '#FFFFFF', '#FFFFFF', '#FFFFFF', '#F0F8FF', '#E8E8FF',
    '#AADDFF', '#88BBFF', '#66DDFF', '#FFDDAA', '#FFCCAA',
    '#FFAAAA', '#FF8866', '#FF6688', '#CCAAFF', '#AA88FF',
    '#FFEECC', '#FFCC88', '#FF99FF', '#AAFFCC', '#88EEBB'
  ];

  var farStars = [];
  var nearStars = [];
  var farCount = 500;
  var nearCount = 150;
  var maxZ = 300;
  var focal = 120;

  function createStar(isFar) {
    return {
      x: (Math.random() - 0.5) * (isFar ? 400 : 600),
      y: (Math.random() - 0.5) * (isFar ? 400 : 600),
      z: Math.random() * maxZ + 1,
      r: (isFar ? 0.15 : 0.4) + Math.random() * (isFar ? 0.3 : 1.2),
      c: colors[Math.floor(Math.random() * colors.length)],
      ts: 0.5 + Math.random() * (isFar ? 3 : 1.5),
      to: Math.random() * Math.PI * 2
    };
  }

  for (var i = 0; i < farCount; i++) farStars.push(createStar(true));
  for (var i = 0; i < nearCount; i++) nearStars.push(createStar(false));

  var speed = 0.04;

  // Shooting stars
  var shootingStars = [];
  var shootTimer = 0;



  function drawStar(ctx2, x, y, size, color, alpha, scale) {
    // Ship jitter
    x += (Math.random() - 0.5) * 0.3;
    y += (Math.random() - 0.5) * 0.3;

    // Warp streak for very close stars
    if (scale > 40) {
      var stretch = Math.min(scale / 15, 6);
      ctx2.globalAlpha = alpha * 0.6;
      ctx2.fillStyle = color;
      ctx2.beginPath();
      ctx2.ellipse(x, y, size * stretch, size, 0, 0, Math.PI * 2);
      ctx2.fill();
      ctx2.globalAlpha = 1;
      return;
    }

    ctx2.beginPath();
    ctx2.arc(x, y, size, 0, Math.PI * 2);
    ctx2.fillStyle = color;
    ctx2.globalAlpha = alpha;
    ctx2.fill();

    if (size > 1.0) {
      ctx2.beginPath();
      ctx2.arc(x, y, size * 0.4, 0, Math.PI * 2);
      ctx2.fillStyle = '#FFFFFF';
      ctx2.globalAlpha = alpha * 0.5;
      ctx2.fill();
    }
    if (size > 2.0) {
      ctx2.strokeStyle = color;
      ctx2.globalAlpha = alpha * 0.35;
      ctx2.lineWidth = Math.max(0.5, size * 0.15);
      ctx2.beginPath();
      ctx2.ellipse(x, y, size * 1.8, size * 0.5, 0.3, 0, Math.PI * 2);
      ctx2.stroke();
    }
  }

  var time = 0;

  function draw() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    if (c.width !== w || c.height !== h) {
      c.width = w;
      c.height = h;
    }
    ctx.clearRect(0, 0, w, h);
    time += 0.005;

    // Shooting stars
    shootTimer += 0.005;
    if (shootTimer > 1.5 + Math.random() * 2) {
      shootTimer = 0;
      shootingStars.push({
        x: Math.random() * w,
        y: 0,
        vx: (Math.random() - 0.5) * 6 - 2,
        vy: 3 + Math.random() * 4,
        life: 1.0,
        len: 30 + Math.random() * 50,
        color: '#FFFFFF'
      });
    }
    for (var i = shootingStars.length - 1; i >= 0; i--) {
      var ss = shootingStars[i];
      ss.x += ss.vx;
      ss.y += ss.vy;
      ss.life -= 0.02;
      if (ss.life <= 0 || ss.x < -50 || ss.x > w + 50 || ss.y > h + 50) {
        shootingStars.splice(i, 1);
        continue;
      }
      // Tail
      ctx.strokeStyle = 'rgba(255,255,255,' + (ss.life * 0.6) + ')';
      ctx.lineWidth = 1.5 * ss.life;
      ctx.beginPath();
      ctx.moveTo(ss.x, ss.y);
      ctx.lineTo(ss.x - ss.vx * ss.life * 1.5, ss.y - ss.vy * ss.life * 1.5);
      ctx.stroke();
      // Head
      ctx.beginPath();
      ctx.arc(ss.x, ss.y, 1.5 * ss.life, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + (ss.life * 0.9) + ')';
      ctx.fill();
    }



    // Far layer
    for (var i = 0; i < farStars.length; i++) {
      var s = farStars[i];
      s.z -= speed * 0.4;
      if (s.z < 1) { s.z = maxZ; s.x = (Math.random() - 0.5) * 400; s.y = (Math.random() - 0.5) * 400; }
      var sc = focal / s.z;
      var sx = s.x * sc + w / 2;
      var sy = s.y * sc + h / 2;
      if (sx < -100 || sx > w + 100 || sy < -100 || sy > h + 100) { s.z = maxZ; s.x = (Math.random() - 0.5) * 400; s.y = (Math.random() - 0.5) * 400; continue; }
      var tw = 0.5 + 0.5 * Math.sin(time * s.ts + s.to);
      var al = Math.min(1, (maxZ - s.z) / (maxZ * 0.8)) * (0.7 + 0.3 * tw);
      var sz = s.r * Math.max(0.3, sc);
      drawStar(ctx, sx, sy, sz, s.c, al, sc);
    }

    // Near layer
    for (var i = 0; i < nearStars.length; i++) {
      var s = nearStars[i];
      s.z -= speed;
      if (s.z < 1) { s.z = maxZ; s.x = (Math.random() - 0.5) * 600; s.y = (Math.random() - 0.5) * 600; }
      var sc = focal / s.z;
      var sx = s.x * sc + w / 2;
      var sy = s.y * sc + h / 2;
      if (sx < -100 || sx > w + 100 || sy < -100 || sy > h + 100) { s.z = maxZ; s.x = (Math.random() - 0.5) * 600; s.y = (Math.random() - 0.5) * 600; continue; }
      var tw = 0.5 + 0.5 * Math.sin(time * s.ts + s.to + 1);
      var al = Math.min(1, (maxZ - s.z) / (maxZ * 0.8)) * (0.7 + 0.3 * tw);
      var sz = s.r * Math.max(0.3, sc);
      drawStar(ctx, sx, sy, sz, s.c, al, sc);
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
})();
</script></script>
